name: Release (Production)

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - '**/v[0-9]+.[0-9]+.[0-9]+'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.20.x
      - uses: dominikh/staticcheck-action@ba605356b4b29a60e87ab9404b712f3461e566dc #v1.3.0
        with:
          version: "2022.1.1"
          install-go: "false" # StaticCheck uses go v1.17 which does not support `any`

  test:
    name: Test
    strategy:
      matrix:
        go-version:
          - 1.20.x
        platform:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.20.x
      - name: Run tests
        run: |
          go test ./... -coverprofile coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: 
      - test
      - lint
    env:
      CGO_ENABLED: 0
      TAG: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.20.x
      - name: Login to registry.xaas.ar
        uses: docker/login-action@465a07811f14bebb1938fbed4728c6a1ff8901fc #v2
        with:
          registry: registry.xaas.ar
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}
      - name: Build
        uses: goreleaser/goreleaser-action@7ec5c2b0c6cdda6e8bbb49444bc797dd33d74dd8 #v3
        with:
          version: v0.155.0
          args: --debug
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Enable experimental docker features
        run: |
          mkdir -p ~/.docker/ && \
          echo '{"experimental": "enabled"}' > ~/.docker/config.json
      - name: Create manifest for version
        run: |
          export IMAGE_REPO=registry.xaas.ar/watchtower
          export DH_TAG=$(echo "$TAG" | sed 's/^v*//')
          docker manifest create \
            ${IMAGE_REPO}:$DH_TAG \
            ${IMAGE_REPO}:amd64-$DH_TAG \
            ${IMAGE_REPO}:i386-$DH_TAG \
            ${IMAGE_REPO}:armhf-$DH_TAG \
            ${IMAGE_REPO}:arm64v8-$DH_TAG
      - name: Annotate manifest for version
        run: |
          export IMAGE_REPO=registry.xaas.ar/watchtower
          export TAG=${{ github.ref_name }}
          docker manifest annotate \
            ${IMAGE_REPO}:$(echo $TAG | sed 's/^v*//') \
            ${IMAGE_REPO}:i386-$(echo $TAG | sed 's/^v*//') \
            --os linux \
            --arch 386
          docker manifest annotate \
            ${IMAGE_REPO}:$(echo $TAG | sed 's/^v*//') \
            ${IMAGE_REPO}:armhf-$(echo $TAG | sed 's/^v*//') \
            --os linux \
            --arch arm
          docker manifest annotate \
            ${IMAGE_REPO}:$(echo $TAG | sed 's/^v*//') \
            ${IMAGE_REPO}:arm64v8-$(echo $TAG | sed 's/^v*//') \
            --os linux \
            --arch arm64 \
            --variant v8
      - name: Create manifest for latest
        run: |
          export IMAGE_REPO=registry.xaas.ar/watchtower
          docker manifest create \
            ${IMAGE_REPO}:latest \
            ${IMAGE_REPO}:amd64-latest \
            ${IMAGE_REPO}:i386-latest \
            ${IMAGE_REPO}:armhf-latest \
            ${IMAGE_REPO}:arm64v8-latest
      - name: Annotate manifest for latest
        run: |
          export IMAGE_REPO=registry.xaas.ar/watchtower
          docker manifest annotate \
            ${IMAGE_REPO}:latest \
            ${IMAGE_REPO}:i386-latest \
            --os linux \
            --arch 386
          docker manifest annotate \
            ${IMAGE_REPO}:latest \
            ${IMAGE_REPO}:armhf-latest \
            --os linux \
            --arch arm
          docker manifest annotate \
            ${IMAGE_REPO}:latest \
            ${IMAGE_REPO}:arm64v8-latest \
            --os linux \
            --arch arm64 \
            --variant v8
      - name: Push manifests to registry.xaas.ar
        env:
          DOCKER_USER: ${{ secrets.REGISTRY_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          docker login -u $DOCKER_USER -p $DOCKER_TOKEN registry.xaas.ar && \
            docker manifest push registry.xaas.ar/watchtower:$(echo $TAG | sed 's/^v*//') && \
            docker manifest push registry.xaas.ar/watchtower:latest

  renew-docs:
    name: Refresh pkg.go.dev
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Pull new module version
      uses: andrewslotin/go-proxy-pull-action@50fea06a976087614babb9508e5c528b464f4645 #master@2022-10-14

  
  

  
